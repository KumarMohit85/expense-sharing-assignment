services:
  postgres:
    image: postgres:17
    container_name: expense-sharing-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_sharing_db
    ports:
      - "5433:5432"
    volumes:
      - expense-sharing-db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

  app:
    build: .
    container_name: expense-sharing-app
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@postgres:5432/expense_sharing_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  expense-sharing-db:
  pgadmin-data: